    frequencies: ["hourly", "monthly"]
  avg_ssurfror:
    name: "Time-mean sub-surface runoff rate"
    param: "235021"
    levtype: "sfc"
    frequencies: ["hourly", "monthly"]
  avg_tsrwe:
