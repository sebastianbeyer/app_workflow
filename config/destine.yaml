experiments:
  storylines-hist:
    class: "d1"
    dataset: "climate-dt"
    type: "fc"
    expver: "0001"
    generation: "2"
    realization: "1"
    activity: "story-nudging"
    experiment: "hist"
    model: "ifs-fesom"
    address: "polytope.mn5.apps.dte.destination-earth.eu"
    resolution: "standard"
    # First month of the climate-DT integration. Used by sequential
    # downstream rules (e.g. hydroland) as the recursion floor. Not sent
    # to polytope — see download/destine.py:build_request.
    startdate: "201701"

  storylines-cont:
    class: "d1"
    dataset: "climate-dt"
    type: "fc"
    expver: "0001"
    generation: "2"
    realization: "1"
    activity: "story-nudging"
    experiment: "cont"
    model: "ifs-fesom"
    address: "polytope.mn5.apps.dte.destination-earth.eu"
    resolution: "standard"
    startdate: "201701"

  storylines-plus2K:
    class: "d1"
    dataset: "climate-dt"
    type: "fc"
    expver: "0001"
    generation: "2"
    realization: "1"
    activity: "story-nudging"
    experiment: "Tplus2.0K"
    model: "ifs-fesom"
    address: "polytope.mn5.apps.dte.destination-earth.eu"
    resolution: "standard"
    startdate: "201701"

  ssp370:
    class: "d1"
    dataset: "climate-dt"
    type: "fc"
    expver: "0001"
    generation: "2"
    realization: "1"
    activity: "projections"
    experiment: "SSP3-7.0"
    model: "ifs-fesom"
    address: "polytope.lumi.apps.dte.destination-earth.eu"
    resolution: "standard"

variables:
  # --- Atmosphere: pressure levels ---
  pv:
    name: "Potential vorticity"
    param: "60"
    levtype: "pl"
    frequencies: ["hourly"]
  z:
    name: "Geopotential"
    param: "129"
    levtype: "pl"
    frequencies: ["hourly", "6-hourly"]
  t:
    name: "Temperature"
    param: "130"
    levtype: "pl"
    frequencies: ["hourly"]
  u:
    name: "U component of wind"
    param: "131"
    levtype: "hl"
    frequencies: ["hourly", "6-hourly"]
  v:
    name: "V component of wind"
    param: "132"
    levtype: "hl"
    frequencies: ["hourly", "6-hourly"]
  u_pl:
    name: "U component of wind (pressure levels)"
    param: "131"
    levtype: "pl"
    frequencies: ["hourly", "6-hourly"]
  v_pl:
    name: "V component of wind (pressure levels)"
    param: "132"
    levtype: "pl"
    frequencies: ["hourly", "6-hourly"]
  q:
    name: "Specific humidity"
    param: "133"
    levtype: "pl"
    frequencies: ["hourly"]
  w:
    name: "Vertical velocity"
    param: "135"
    levtype: "pl"
    frequencies: ["hourly"]
  r:
    name: "Relative humidity"
    param: "157"
    levtype: "pl"
    frequencies: ["hourly"]
  clwc:
    name: "Specific cloud liquid water content"
    param: "246"
    levtype: "pl"
    frequencies: ["hourly"]

  # --- Atmosphere: pressure levels (jet stream, 200+300 hPa only) ---
  u_jet:
    name: "U wind (jet levels 200+300 hPa)"
    param: "131"
    levtype: "pl"
    levelist: "200/300"
    frequencies: ["daily"]
  v_jet:
    name: "V wind (jet levels 200+300 hPa)"
    param: "132"
    levtype: "pl"
    levelist: "200/300"
    frequencies: ["daily"]

  # --- Atmosphere: pressure levels (850 hPa geopotential for H/L detection) ---
  z850:
    name: "Geopotential (850 hPa)"
    param: "129"
    levtype: "pl"
    levelist: "850"
    frequencies: ["daily"]

  # --- Atmosphere: pressure levels (restricted for IVT) ---
  q_pl300:
    name: "Specific humidity (300-1000 hPa)"
    param: "133"
    levtype: "pl"
    levelist: "300/400/500/600/700/850/925/1000"
    frequencies: ["hourly"]
  u_pl300:
    name: "U component of wind (300-1000 hPa)"
    param: "131"
    levtype: "pl"
    levelist: "300/400/500/600/700/850/925/1000"
    frequencies: ["hourly"]
  v_pl300:
    name: "V component of wind (300-1000 hPa)"
    param: "132"
    levtype: "pl"
    levelist: "300/400/500/600/700/850/925/1000"
    frequencies: ["hourly"]

  # --- Atmosphere: pressure levels (full atmosphere for CAPE) ---
  t_full:
    name: "Temperature (full atmosphere)"
    param: "130"
    levtype: "pl"
    levelist: "1/5/10/20/30/50/70/100/150/200/250/300/400/500/600/700/850/925/1000"
    frequencies: ["hourly"]
  q_full:
    name: "Specific humidity (full atmosphere)"
    param: "133"
    levtype: "pl"
    levelist: "1/5/10/20/30/50/70/100/150/200/250/300/400/500/600/700/850/925/1000"
    frequencies: ["hourly"]

  # --- Atmosphere: pressure levels (full atmosphere for nudging diagnostic) ---
  u_full:
    name: "U component of wind (full atmosphere)"
    param: "131"
    levtype: "pl"
    levelist: "1/5/10/20/30/50/70/100/150/200/250/300/400/500/600/700/850/925/1000"
    frequencies: ["hourly"]
  v_full:
    name: "V component of wind (full atmosphere)"
    param: "132"
    levtype: "pl"
    levelist: "1/5/10/20/30/50/70/100/150/200/250/300/400/500/600/700/850/925/1000"
    frequencies: ["hourly"]

  # --- Atmosphere: pressure levels (full atmosphere for updraft) ---
  w_full:
    name: "Vertical velocity (full atmosphere)"
    param: "135"
    levtype: "pl"
    levelist: "1/5/10/20/30/50/70/100/150/200/250/300/400/500/600/700/850/925/1000"
    frequencies: ["hourly"]

  # --- Atmosphere: surface ---
  tclw:
    name: "Total column cloud liquid water"
    param: "78"
    levtype: "sfc"
    frequencies: ["hourly"]
  tciw:
    name: "Total column cloud ice water"
    param: "79"
    levtype: "sfc"
    frequencies: ["hourly"]
  sp:
    name: "Surface pressure"
    param: "134"
    levtype: "sfc"
    frequencies: ["hourly"]
  tcw:
    name: "Total column water"
    param: "136"
    levtype: "sfc"
    frequencies: ["hourly"]
  tcwv:
    name: "Total column vertically-integrated water vapour"
    param: "137"
    levtype: "sfc"
    frequencies: ["hourly"]
  msl:
    name: "Mean sea level pressure"
    param: "151"
    levtype: "sfc"
    frequencies: ["hourly", "daily"]
  10u:
    name: "10 metre U wind component"
    param: "165"
    levtype: "sfc"
    frequencies: ["hourly"]
  10v:
    name: "10 metre V wind component"
    param: "166"
    levtype: "sfc"
    frequencies: ["hourly"]
  2t:
    name: "2 metre temperature"
    param: "167"
    levtype: "sfc"
    frequencies: ["hourly"]
  2d:
    name: "2 metre dewpoint temperature"
    param: "168"
    levtype: "sfc"
    frequencies: ["hourly"]
  lsm:
    name: "Land-sea mask"
    param: "172"
    levtype: "sfc"
    frequencies: ["daily"]
  10si:
    name: "10 metre wind speed"
    param: "207"
    levtype: "sfc"
    frequencies: ["hourly"]
  skt:
    name: "Skin temperature"
    param: "235"
    levtype: "sfc"
    frequencies: ["hourly"]
  orog:
    name: "Orography"
    param: "228002"
    levtype: "sfc"
    frequencies: ["daily"]
  tcc:
    name: "Total cloud cover"
    param: "228164"
    levtype: "sfc"
    frequencies: ["hourly"]

  # --- Atmosphere: surface averages ---
  avg_2t:
    name: "Time-mean 2 metre temperature"
    param: "228004"
    levtype: "sfc"
    frequencies: ["monthly"]
  avg_10ws:
